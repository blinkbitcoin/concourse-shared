#! Auto synced from Shared CI Resources repository
#! Don't change this file, instead change it in github.com/blinkbitcoin/concourse-shared

name: Audit

on:
  pull_request:
    branches: [ main ]

jobs:
  security_audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      # rustsec/audit-check is the maintained fork of the archived
      # actions-rs/audit-check; it runs current cargo-audit against a
      # freshly-pulled advisory-db, matching the Concourse `cargo audit` job.
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
